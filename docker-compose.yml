version: "3.8"

services:
  servidor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitoreo-servidor
    ports:
      - "5000:5000"
      - "6000:6000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    environment:
      - TZ=America/Bogota

  web:
    image: python:3.11-slim
    container_name: monitoreo-web
    working_dir: /app
    command: python3 web_server.py
    ports:
      - "8080:8080"
    volumes:
      - ./web:/app
    depends_on:
      - servidor
    environment:
      - HTTP_PORT=8080
      - DB_PATH=../database.db
      - TZ=America/Bogota
    restart: unless-stopped

networks:
  default:
    name: monitoreo-net